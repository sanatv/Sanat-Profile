name: Keep profile warm

# Pings the deployed sanat-profile every 20 minutes during US Central business
# hours (8:00 AM – ~6:30 PM) so it is warm for daytime visitors while using only
# ~315 instance-hrs/month — far under the 750 free cap.
#
# IMPORTANT: GitHub cron is UTC and does NOT follow daylight saving. The times
# below map to Central DAYLIGHT time (CDT, UTC-5), correct ~Mar–Nov. After DST
# ends (early Nov) the same UTC times become 7:00 AM–5:20 PM CST. To keep the
# 8:00 AM–6:30 PM window in winter, change the hours to: "*/20 14-23 * * *"
# plus "0,20 0 * * *".
#
# Set the live URL once as a repo variable (Settings → Secrets and variables →
# Actions → Variables → New variable):  PROFILE_URL = https://your-app.onrender.com
# If unset, it falls back to the conventional Render URL below.

on:
  schedule:
    # Every 20 min, 13:00–23:20 UTC = 8:00 AM – 6:20 PM CDT (stays warm to ~6:35 PM)
    - cron: "*/20 13-22 * * *"
    - cron: "0,20 23 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          BASE="${{ vars.PROFILE_URL || 'https://sanat-profile.onrender.com' }}"
          URL="${BASE%/}/api/health"
          echo "Pinging $URL"
          for attempt in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 75 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "OK ($code) on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt got HTTP $code — instance may be waking; retrying in 30s"
            sleep 30
          done
          echo "Ping failed after retries"
          exit 1
